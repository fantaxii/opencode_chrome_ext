<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCode Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-left">
        <span class="connection-indicator">●</span>
        <span class="connection-text" id="connection-text">연결 안됨</span>
      </div>
      <div class="header-right">
        <div class="mcp-wrapper">
          <button id="mcp-btn" class="mcp-btn" title="MCP 서버 관리">
            <span id="mcp-count-text">MCP</span>
          </button>
          <div id="mcp-dropdown" class="mcp-dropdown hidden"></div>
        </div>
        <span class="header-placeholder">PowerShell</span>
      </div>
    </header>

    <div id="messages-container" class="messages-container">
      <div class="welcome-section">
        <div class="welcome-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="var(--accent)" opacity="0.15"/>
            <path d="M12 16h24M12 24h16M12 32h20" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="36" cy="32" r="5" fill="var(--accent)" opacity="0.8"/>
            <path d="M34 32l1.5 1.5L38 30" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2 class="welcome-title">OpenCode</h2>
        <p class="welcome-subtitle">웹 페이지 AI 어시스턴트</p>
        <p class="welcome-desc">페이지 요약, 설명, 검색 등을<br>요청해보세요.</p>
        <p class="welcome-hint">메시지를 입력하거나 <kbd>/</kbd> 로 커맨드를 실행하세요.</p>
      </div>
    </div>
    <div class="input-area" id="input-area">
      <div class="input-wrapper">
        <div id="command-dropdown" class="command-dropdown hidden"></div>
        <button id="attach-btn" class="attach-btn" title="첨파일">+</button>
        <textarea
          id="message-input"
          placeholder="메시지를 입력하세요..."
          rows="1"
        ></textarea>
        <button id="send-btn" class="send-btn" disabled>↑</button>
      </div>
      <div class="selectors-wrapper">
        <div class="agent-model-row">
          <div class="agent-bar" id="agent-bar" title="Shift+Tab으로 에이전트 변경">
            <span class="agent-dot" id="agent-dot">●</span>
            <span class="agent-name" id="agent-name">에이전트</span>
            <span class="agent-hint">⇧Tab</span>
          </div>
          <select id="model-select" class="model-select">
            <option value="">모델 선택</option>
          </select>
        </div>
        <div class="working-folder-wrapper" id="working-folder-wrapper">
          <span class="folder-icon" id="folder-icon">📁</span>
          <span id="working-folder-display" class="working-folder-display">폴더 없음</span>
          <input id="working-folder-input" class="working-folder-input hidden" type="text" placeholder="/path/to/folder">
          <button id="working-folder-edit-btn" class="working-folder-edit-btn" title="edit">✎</button>
        </div>
      </div>
    </div>
  </div>

  <div id="loading-indicator" class="loading-indicator hidden">
    <div class="spinner"></div>
    <span>응답 대기 중...</span>
  </div>

  <div id="connecting-indicator" class="connecting-indicator hidden">
    <div class="connecting-message" id="connecting-message">OpenCode server connecting...</div>
    <div class="connecting-spinner" id="connecting-spinner"></div>
    <button id="retry-btn" class="retry-btn hidden">재연결</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCode Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-left">
        <span class="connection-indicator">●</span>
        <span class="connection-text" id="connection-text">연결 안됨</span>
      </div>
      <div class="header-right">
        <span class="header-placeholder">MCP 정보</span>
        <span class="header-placeholder">PowerShell</span>
      </div>
    </header>

    <div id="messages-container" class="messages-container">
      <div class="welcome-section">
        <div class="opencode-icon">■</div>
        <div class="page-info">
          <div class="page-icon">🌐</div>
          <div class="page-title" id="page-title">Z.ai - Inspiring AGI to Benefit Humanity</div>
          <div class="page-url" id="page-url">https://z.ai/manage-apikey/billing</div>
        </div>
        <p class="welcome-text">이 페이지에 대해 요약, 설명, 검색 등을 요청해보세요.</p>
      </div>
    </div>
    <div class="input-area" id="input-area">
      <div class="input-wrapper">
        <button id="attach-btn" class="attach-btn" title="첨파일">+</button>
        <textarea
          id="message-input"
          placeholder="메시지를 입력하세요..."
          rows="1"
        ></textarea>
        <button id="send-btn" class="send-btn" disabled>↑</button>
      </div>
      <div class="selectors-wrapper">
        <div class="working-folder-wrapper" id="working-folder-wrapper">
          <span class="folder-icon" id="folder-icon">📁</span>
          <span id="working-folder-display" class="working-folder-display">폴더 없음</span>
          <input id="working-folder-input" class="working-folder-input hidden" type="text" placeholder="/path/to/folder">
          <button id="working-folder-edit-btn" class="working-folder-edit-btn" title="edit">✎</button>
        </div>
        <select id="model-select" class="model-select">
          <option value="">모델 선택</option>
        </select>
      </div>
    </div>
  </div>

  <div id="loading-indicator" class="loading-indicator hidden">
    <div class="spinner"></div>
    <span>응답 대기 중...</span>
  </div>

  <div id="connecting-indicator" class="connecting-indicator hidden">
    <div class="connecting-message" id="connecting-message">OpenCode server connecting...</div>
    <div class="connecting-spinner" id="connecting-spinner"></div>
    <button id="retry-btn" class="retry-btn hidden">재연결</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
